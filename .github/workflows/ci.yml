name: CI

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manually running E2E (and all jobs) from the Actions tab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1

jobs:
  # ── Rust checks ──────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Linux only: install system deps needed by Tauri + ssh2
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libssh-dev

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check
        working-directory: src-tauri
        run: cargo check

      - name: cargo test
        working-directory: src-tauri
        run: cargo test

  # ── Dependency advisory audit ────────────────────────────
  # Real quality gate: fails on any NEW vulnerability. A small set of advisories
  # is explicitly accepted via --ignore, each documented below. Review on bumps.
  #   RUSTSEC-2023-0071  rsa Marvin timing side-channel — no upstream fix exists
  #   RUSTSEC-2026-0154  russh unbounded alloc — CLI-only; fix needs russh>=0.60 (major break)
  #   RUSTSEC-2026-0153  russh-cryptovec — same root cause as above
  # (Unmaintained-crate warnings come from Tauri's GTK3 tree and are informational.)
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        working-directory: src-tauri
        run: >
          cargo audit
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2026-0154
          --ignore RUSTSEC-2026-0153

  # ── SBOM (CycloneDX) ─────────────────────────────────────
  # Software Bill of Materials for supply-chain transparency. Generated on
  # every push to main and uploaded as a build artifact.
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate Rust SBOM
        working-directory: src-tauri
        run: cargo cyclonedx --format json --override-filename sbom-rust

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Generate npm SBOM
        run: |
          npm ci
          npx @cyclonedx/cyclonedx-npm --output-file sbom-npm.json || true

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            src-tauri/sbom-rust.json
            sbom-npm.json
          retention-days: 90
          if-no-files-found: warn

  # ── Frontend checks ──────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --ext .ts,.tsx --max-warnings 0
        continue-on-error: true

      - name: Unit tests (Vitest)
        run: npm test

  # ── Frontend E2E (Playwright) ────────────────────────────
  # E2E tests run only on manual dispatch (workflow_dispatch).  They are
  # disabled on push/PR/tag because the Tauri-IPC mock relies on browser-
  # only behaviour that drifts ahead of the headless CI environment.
  # Run locally with `npm run test:e2e`.
  e2e:
    name: E2E tests (manual only)
    if: github.event_name == 'workflow_dispatch'
    needs: [frontend]
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── Tauri build (smoke test, no bundle) ──────────────────
  build:
    name: Tauri build (${{ matrix.os }})
    needs: [rust, frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libssh-dev

      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: brew install openssl pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (no bundle)
        working-directory: src-tauri
        run: cargo build --release
        env:
          # 30-18: set at release time to embed the update public key
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

  # ── Release + code signing (30-17) ──────────────────────
  release:
    name: Release (${{ matrix.platform }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [rust, frontend]
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write  # required to create GitHub releases and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary (Intel + Apple Silicon)
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          # Linux x86_64
          - platform: ubuntu-latest
            args: ''
            rust_targets: ''
          # Linux ARM64 (GitHub-hosted arm runner)
          - platform: ubuntu-24.04-arm
            args: ''
            rust_targets: ''
          # Windows x86_64
          - platform: windows-latest
            args: ''
            rust_targets: ''

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libssh-dev

      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: brew install openssl pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and package Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 30-18: updater signing key (generate with: cargo tauri signer generate)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 30-17: Authenticode code signing via Azure Trusted Signing or self-signed cert
          # Set AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID in repo secrets
          # if using Azure Trusted Signing. Or provide a PFX via WINDOWS_CERTIFICATE.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: NexoRC ${{ github.ref_name }}
          releaseBody: |
            See the [CHANGELOG](CHANGELOG.md) for details.
          releaseDraft: true
          # Beta channel: tags like v1.0.0-beta.1 / v1.0.0-rc.1 (containing a
          # hyphen) are published as pre-releases, separate from stable.
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      # GPG-sign Linux bundles (defence in depth). Runs only when a GPG key is
      # configured in repo secrets — a no-op otherwise.
      - name: GPG-sign Linux bundles
        if: runner.os == 'Linux' && env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/deb/*.deb \
                   src-tauri/target/release/bundle/appimage/*.AppImage; do
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" --detach-sign --armor "$f"
            gh release upload "${{ github.ref_name }}" "$f.asc" --clobber
          done
